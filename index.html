<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure ID Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --slate-950: #020617;
        --slate-900: #0f172a;
        --slate-800: #1e293b;
        --slate-700: #334155;
        --slate-600: #475569;
        --slate-400: #94a3b8;
        --indigo-500: #6366f1;
        --indigo-600: #4f46e5;
      }

      .animate-fade-in {
        animation: fadeIn 0.5s ease-in-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-title-pop-in {
        animation: titlePopIn 0.8s ease-out 0.2s forwards;
        opacity: 0;
      }
      @keyframes titlePopIn {
        from { opacity: 0; transform: translateY(20px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }

      /* Updated Background */
      .main-bg {
        background-color: var(--slate-950);
        background-image: radial-gradient(circle at 1px 1px, var(--slate-800) 1px, transparent 0);
        background-size: 2rem 2rem;
      }
      
      ::selection {
        background-color: var(--indigo-500);
        color: white;
      }

      /* General App Container Styling */
      .app-container {
        width: 100%;
        max-width: 42rem; /* increased max-width from lg to ~xl */
        margin-left: auto;
        margin-right: auto;
      }

      .view-container {
        background-color: var(--slate-900);
        border: 1px solid var(--slate-800);
        border-radius: 0.75rem; /* rounded-xl */
        padding: 2rem;
        box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
      }

      /* Updated Role Switcher Styles */
      .role-switcher-container {
        position: relative;
        display: flex;
        width: 100%;
        max-width: 32rem; /* max-w-lg */
        justify-content: center;
        padding: 0.25rem; /* p-1 */
        background-color: var(--slate-800);
        border-radius: 0.5rem; /* rounded-lg */
        margin-bottom: 2rem; /* mb-8 */
      }
      .role-switcher-slider {
        position: absolute;
        top: 0.25rem;
        bottom: 0.25rem;
        border-radius: 0.375rem; /* rounded-md */
        background-color: var(--indigo-600);
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 0;
      }
    </style>
  <script type="importmap">
{

  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>

  </body>
</html>
